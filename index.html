<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎶 Cancionero MV</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎶 Cancionero MV</h1>

<div class="top-bar">

  <!-- FILA 1: BUSCADOR -->
  <div class="top-row">
    <input id="buscador" type="text" placeholder="🔎 Buscar canción o letra..." />
  </div>

  <!-- FILA 2: CONTROLES -->
  <div class="controls-row">
    <select id="libro">
      <option value="cancionero">🎶 Cancionero MV</option>
      <option value="himnario">📖 Himnario Adventista</option>
    </select>

    <button id="toggleLista" onclick="toggleLista()">📁</button> 
    <button id="fontSizeBtn" onclick="toggleFontSize()">🔠</button>
    <button id="projectorBtn" onclick="toggleProjectorMode()">📽️</button>

    <select id="idioma">
      <option value="en">🇺🇸 English</option>
      <option value="es" selected>🇦🇷 Español</option>
      <option value="it">🇮🇹 Italiano</option>
      <option value="pt">🇧🇷 Português</option>
    </select>

    <button id="themeToggle" onclick="toggleTheme()">☀️</button>
  </div>

</div>

<!-- ALFABETO -->
<div id="alfabeto"></div>

<!-- ÍNDICE -->
<ul id="indice" class="hidden"></ul>

<hr>

<!-- CONTENIDO -->
<div id="contenido"></div>

<script src="app.js"></script>

</body>
</html>
