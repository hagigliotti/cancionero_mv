<!DOCTYPE html>
<html lang="es">

<!-- ======================================== HEAD ======================================== -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>🎶 Cancionero MV - hag</title>

  <!-- ICONOS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css?v=2">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XS6DM59CNT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-XS6DM59CNT');
  </script>
</head>

<!-- ======================================== BODY ======================================== -->
<body>

<div class="app">

  <!-- <h1<h1>🎶 Cancionero MV</h1> -->
  <h1 class="logo-title">
    <img id="logoCancionero"
        src="imagenes/Cancionero_blue.png"
        alt="Cancionero MV">
  </h1>

  <!-- ===================== TOP BAR =====================  -->
  <div class="top-bar">

    <div class="top-inline">

      <!-- ☰ MENU -->
      <div class="menu-wrapper">
        <button type="button" id="menuBtn" onclick="toggleMenu()">
          <i class="fa-solid fa-bars"></i>
        </button>

        <div id="dropdownMenu" class="dropdown-menu">

          <div class="menu-item" onclick="abrirInfoDesdeMenu()">ℹ️ Acerca de...</div>

          <div class="divider"></div>

          <div class="menu-section-title">
            📚 Libros e Idiomas:
          </div>

          <div class="menu-item" style="display:flex; justify-content:space-between; align-items:center;">
            📖 Libro:
            <select id="menuLibro">
              <option value="cancionero">Cancionero MV</option>
              <option value="himnario">Himnario Adventista</option>
              <option value="campamento">Campamento</option>
            </select>
          </div>

          <div class="menu-item" style="display:flex; justify-content:space-between; align-items:center;">
            🌐 Idioma:
            <select id="menuIdioma" disabled>
              <option value="es">🇦🇷 Español</option>
              <option value="en">🇺🇸 English</option>
              <option value="it">🇮🇹 Italiano</option>
              <option value="pt">🇧🇷 Português</option>
            </select>
          </div>

          <div class="divider"></div>
<!--
          <div class="menu-item" onclick="closeMenu()">⭐ Favoritos</div>

          <div class="divider"></div>
-->

          <div class="menu-item font-controls" style="display:flex; justify-content:space-between; align-items:center;">
            
            🅰️ Tamaño:<br><br>
            <button type="button" onclick="cambiarFuente(-1)">A-</button>
            <button type="button" onclick="resetFuente()">A</button>
            <button type="button" onclick="cambiarFuente(1)">A+</button>
          </div>
          
          <div class="menu-item tab-item" id="tabToggle">
            <span>🎸</span>
            Tablatura:
            <button id="tabBtn" type="button">Mostrar</button>
          </div>

          <div class="menu-item" onclick="abrirMetronomo()">
            📟 Metrónomo y Afinador
          </div>

          <div class="divider"></div>

<!--
          <div class="menu-title">
            🎼 Transposición:
          </div>

          <div class="menu-item sub-item">
            <button onclick="transposeDown()">⬇️ -1</button>
            <button onclick="resetTranspose()">⏺️ 0</button>
            <button onclick="transposeUp()">⬆️ +1</button>
          </div>

          <div class="divider"></div>
-->
          <div class="menu-section-title">
            🧩 Modos de visualización:
          </div>

          <div id="themeMenuItem" class="menu-item sub-item" onclick="toggleTheme(); closeMenu()">
            🕶️ Tema oscuro
          </div>
          
          <div class="menu-item sub-item" onclick="toggleProjectorMode(); closeMenu()">
            📽️ Proyector
          </div>

          <div class="divider"></div>

          <div class="menu-section-title">
            ♻️ Feedback:
          </div>

          <a class="menu-item sub-item" href="mailto:hagigliotti@gmail.com?subject=Feedback%20-%20Cancionero%20MV">📩 Escribime</a>

          <a class="menu-item sub-item" href="https://www.paypal.com/" target="_blank" rel="noopener noreferrer">💖 Donaciones</a>

        </div>
      </div>

      <!-- 🔎 BUSCADOR 👓🕶️-->
      <input id="buscador" type="text" placeholder="🔎 Buscar titulo, letra, compositor, tiempo, ritmo, tags, etc." />

      <!-- 🌐 IDIOMA (botón rápido) -->
      <div class="lang-wrapper">
        <button type="button" id="langBtn">🇦🇷</button>

        <select id="idioma">
          <option value="es" selected>🇦🇷</option>
          <option value="en">English</option>
          <option value="it">Italiano</option>
          <option value="pt">Português</option>
          <!-- <option value="fr">Français</option> -->
          <!-- <option value="de">Deutsch</option> -->
          <!-- <option value="he">עברית</option> -->
          <option value="gn">Guaraní</option>
          <!-- <option value="zu">isiZulu</option> -->
        </select>
      </div>

    </div>
  </div>

  <!-- ===================== CONTROLES ===================== -->
  <div class="top-row">
    <button type="button" id="toggleLista" onclick="toggleLista()">📁</button> 
  </div>

  <!-- ===================== ALFABETO ===================== -->
  <div id="alfabeto"></div>

  <!-- ===================== ÍNDICE ===================== -->
  <ul id="indice" class="hidden"></ul>
  <br>
  <hr> <!-- Linea que divide el menu superior con el indice y alfabeto de la cancion-->

  <!-- ===================== CONTENIDO ===================== -->
  <div id="contenido"></div>
  <hr> <!-- Linea que divide el menu superior con el indice y alfabeto de la cancion-->

</div>


<!-- ======================================== JS ======================================== -->
<script src="modals.js"></script>
<script src="lenguage.js"></script>
<script src="utils.js"></script>
<script src="theme.js"></script>
<script src="afinometro.js"></script>
<script src="app.js"></script>
<script src="songbook.js"></script>

<!-- ======================================== FOOTER ======================================== -->
<footer class="app-footer"><br>
  © 2026 @hagigliotti — Cancionero MV
</footer>

</body>

</html>
